# Starter tmux config — adoption roadmap item 2 (2026-07-10). Trim/extend as habits form.

# Prefix: Ctrl-Space (C-b default is awkward; C-a clashes with shell start-of-line)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True color + sane terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse (click panes/tabs, scroll, resize)
set -g mouse on

# Big scrollback for agent output
set -g history-limit 100000

# Windows/panes start at 1; renumber when one closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# vi keys in copy mode (you're a vim user)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Intuitive splits: prefix + | (side by side), prefix + - (stacked); keep cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Fast window switching: prefix + n/p, or Shift+arrows without prefix
bind -n S-Left previous-window
bind -n S-Right next-window

# Jump straight to a window by number: Alt+1..9 (no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Session switching:
#   prefix + Tab      → toggle to last session (fast A/B between two repos)
#   Alt + o (no prefix) → fuzzy popup of all sessions (needs fzf)
bind Tab switch-client -l
bind -n M-o display-popup -E "tmux list-sessions -F '#S' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse --prompt 'session> ' | xargs -r tmux switch-client -t"

# Status bar at bottom (2026-07-15: Parth's eyes live at the bottom of the screen while typing);
# colors/styling handled by Catppuccin (composed below run tpm)
set -g status-position bottom

# Resize panes: prefix + H/J/K/L (repeatable, 5 cells per tap)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Clear screen (Ctrl-l is taken by pane nav): Option+k clears, Option+l clears + wipes scrollback
bind -n M-k send-keys C-l
bind -n M-l send-keys C-l \; clear-history

# Don't wait after Esc (matters in vim)
set -sg escape-time 10

# Reload this config: prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ---- Plugins (TPM) ----
# Install/update: prefix + I  (capital i). Update: prefix + U. Remove: prefix + alt-u.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'   # Ctrl-h/j/k/l across vim splits + tmux panes
set -g @plugin 'tmux-plugins/tmux-yank'           # robust copy to macOS clipboard
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-save every 15m, auto-restore on start
set -g @plugin 'catppuccin/tmux'                  # theme

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'   # restore on-screen text, not just layout

# Catppuccin theme options (must be set before tpm loads the plugin)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text " #{=|24|…:window_name}"      # name only, truncated to 24 chars
set -g @catppuccin_window_current_text " #{=|24|…:window_name}"

# Keep this line at the very bottom of the file.
run '~/.config/tmux/plugins/tpm/tpm'

# ---- Cross-session attention: adopted workmux (raine/workmux) 2026-07-15 ----
# workmux-status Claude plugin sets per-window icons (🤖 working / 💬 waiting / ✅ done);
# prefix-l jumps to the next agent needing you. Replaced the earlier DIY attn scripts.
bind l run-shell "workmux last-done"

# ---- Status line composition (after Catppuccin is loaded) ----
# Identity left, ambient info right — session anchors the left corner in an accent pill
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-left-length 30
# Right side, left→right: git (branch+divergence+dirty) · low-battery warning (only when <=20% on battery) · time
set -g status-right-length 120
set -g status-right '#(~/.config/tmux/gitmux-seg.sh "#{pane_current_path}")'
set -ag status-right "#(~/.config/tmux/battery-low.sh)"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text " %a %H:%M"
# gitmux needs a working tree; segment is empty in non-repo panes. Refresh cadence = status-interval.

# Pane focus cues: accent border on active pane, one-step-darker inactive panes (Catppuccin Mocha)
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#b4befe"
# window-style/window-active-style dimming removed — vim's own highlight (guibg=#181825) now owns that contrast

# Label each pane border with its running command (vim / claude / zsh)
set -g pane-border-status top
set -g pane-border-format " #[fg=#6c7086]#{pane_current_command} "
set -g pane-border-lines single

# Command prompt + copy-mode selection, on-palette
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#585b70,fg=#cdd6f4"
